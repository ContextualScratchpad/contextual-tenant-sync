name: Sync Contextual Snapshot

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    uses: ContextualScratchpad/contextual-tenant-sync/.github/workflows/reusable-sync.yml@v1
    with:
      tenant_id: ${{ vars.CTXL_TENANT_ID }}
      silo: ${{ vars.CTXL_SILO }}
    secrets: inherit
